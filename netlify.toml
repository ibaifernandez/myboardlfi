[build]
  base    = "client"
  command = "npm run build"
  publish = "dist"

# Proxy /api/* → Railway backend (evita CORS y no requiere cambios en el frontend)
[[redirects]]
  from   = "/api/*"
  to     = "https://web-production-aa41d.up.railway.app/api/:splat"
  status = 200
  force  = true

# Proxy /uploads/* → Railway
[[redirects]]
  from   = "/uploads/*"
  to     = "https://web-production-aa41d.up.railway.app/uploads/:splat"
  status = 200
  force  = true

# SPA fallback — todas las rutas van a index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
